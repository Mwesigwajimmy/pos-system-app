<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBU1 - No Connection</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .loading-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 0 24px;
        }

        .loader-container {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            z-index: 2;
            animation: breathe 2.4s infinite ease-in-out;
            user-select: none;
        }

        .signal-ring {
            position: absolute;
            width: 90px;
            height: 90px;
            border: 3px solid rgba(220, 38, 38, 0.45); /* Alert Red */
            border-radius: 50%;
            box-shadow: 0 0 16px 2px rgba(220, 38, 38, 0.35);
            z-index: 1;
            animation: signalOut 2.4s infinite cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .signal-ring.delay-1 { animation-delay: 0.8s; }
        .signal-ring.delay-2 { animation-delay: 1.6s; }

        .status-text {
            margin: 0;
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(244, 0, 0, 0.65);
            animation: breathe 2.4s infinite ease-in-out;
        }

        .message {
            margin: 0;
            max-width: 380px;
            font-size: 14px;
            line-height: 1.5;
            text-align: center;
            color: #000000;
        }

        .retry-btn {
            border: none;
            outline: none;
            cursor: pointer;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
            background-color: #dc2626;
            border-radius: 999px;
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.35);
            transition: background-color 0.25s ease, transform 0.15s ease, box-shadow 0.25s ease;
        }

        .retry-btn:hover { background-color: #771616; }
        .retry-btn:active { transform: scale(0.96); }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes signalOut {
            0% { transform: scale(0.8); opacity: 0.7; }
            100% { transform: scale(2.6); opacity: 0; filter: blur(4px); }
        }
    </style>
</head>
<body>

    <div class="loading-wrap">
        <div class="loader-container">
            <div class="signal-ring"></div>
            <div class="signal-ring delay-1"></div>
            <div class="signal-ring delay-2"></div>
            <!-- FIXED PATH: points to logo.png in public folder -->
            <img class="logo-img" src="logo.png" alt="BBU1 Logo">
        </div>

        <p class="status-text">No Connection</p>
        <p class="message">You're offline. Please check your internet connection and try again.</p>

        <button class="retry-btn" id="retryBtn" onclick="window.location.reload()">Retry</button>
    </div>

    <script>
        window.addEventListener('online', () => window.location.reload());
    </script>

</body>
</html>
